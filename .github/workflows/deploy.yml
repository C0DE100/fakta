name: Deploy to Hostinger

on:
  push:
    branches: [main]

# Avoid overlapping deploys if two merges land close together
concurrency:
  group: ftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          # FTP account is scoped to public_html/fakta, so root = "/"
          server-dir: ./
          # Never touch production config or user uploads, and skip repo/meta files
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.claude/**
            config.php
            uploads/**
            **/*.md
